git:
  pagers:
    - colorArg: always
      useConfig: true
gui:
  theme:
    lightTheme: false
    activeBorderColor:
      - '#DAFEB4'
      # - green
      - bold
    inactiveBorderColor:
      - "#625e5a"
    optionsTextColor:
      - blue
    selectedLineBgColor:
      - reverse
    selectedRangeBgColor:
      - blue
    cherryPickedCommitBgColor:
      - cyan
    cherryPickedCommitFgColor:
      - blue
    unstagedChangesColor:
      - red
  nerdFontsVersion: "3"
  showFileTree: false # for rendering changes files in a tree format
customCommands:
  - key: "M"
    command: "git mergetool {{ .SelectedFile.Name }}"
    context: "files"
    loadingText: "opening git mergetool"
    output: terminal
